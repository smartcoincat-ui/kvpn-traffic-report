<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dash • Аналитика трафика</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
body{font-family:Inter,system-ui;background:#f5f7fb;margin:0;color:#1f2937}.wrap{max-width:1180px;margin:20px auto;padding:0 14px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 6px 20px rgba(0,0,0,.04)}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.kpi{grid-column:span 3}.wide{grid-column:span 8}.mid{grid-column:span 4}.full{grid-column:1/-1}@media(max-width:900px){.kpi,.wide,.mid{grid-column:1/-1}}
.muted{color:#6b7280}.pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:8px;border-bottom:1px solid #eee;text-align:left}
</style></head><body><div class="wrap"><div class="card"><h1>📱 Dash — интерактивная аналитика трафика</h1><div class='muted'>Сформирован: 2026-04-03T16:50:59.336566Z • Источник: VPN мониторинг</div></div>
<div class='grid'>
<section class='card kpi'><div class='muted'>Срез пакетов</div><h2 id='pk'></h2></section>
<section class='card kpi'><div class='muted'>Срез трафика</div><h2 id='mb'></h2></section>
<section class='card kpi'><div class='muted'>Точек времени</div><h2 id='pts'></h2></section>
<section class='card kpi'><div class='muted'>Статус</div><h2 id='st'></h2></section>
<section class='card wide'><h3>Временная шкала трафика (MB)</h3><canvas id='timeline'></canvas></section>
<section class='card mid'><h3>Типы трафика (оценка)</h3><canvas id='types'></canvas></section>
<section class='card full'><h3>Интерпретация</h3><ul id='insights'></ul></section>
<section class='card full'><h3>Топ endpoint'ов (срез)</h3><table><thead><tr><th>#</th><th>Endpoint</th><th>Пакеты</th><th>MB</th></tr></thead><tbody id='tb'></tbody></table></section>
</div></div>
<script>const d={"generatedAt": "2026-04-03T16:50:59.336566Z", "history": [{"ts": "2026-04-02T20:12:24.380932Z", "packets": 0, "bytes": 0, "dash1Bytes": 0, "dash2Bytes": 0, "label": "02.04 20:12"}, {"ts": "2026-04-02T20:23:58.300745Z", "packets": 0, "bytes": 0, "dash1Bytes": 0, "dash2Bytes": 0, "label": "02.04 20:23"}, {"ts": "2026-04-03T16:50:05.833323Z", "packets": 0, "bytes": 0, "dash1Bytes": 0, "dash2Bytes": 0, "label": "03.04 16:50"}], "snapshot": {"generatedAt": "2026-04-03T16:50:05.833323Z", "captureFile": "/opt/netstack/monitor/dash-20260403T165005Z.log", "devices": {}, "topEndpoints": [], "totalPackets": 0, "totalBytes": 0}, "trafficTypes": []};
const s=d.snapshot||{};document.getElementById('pk').textContent=s.totalPackets||0;document.getElementById('mb').textContent=((s.totalBytes||0)/1024/1024).toFixed(3)+' MB';document.getElementById('pts').textContent=(d.history||[]).length;document.getElementById('st').textContent=((s.totalBytes||0)>0)?'🟢 активность есть':'⚪ данных мало/нет';
const labels=(d.history||[]).map(x=>x.label||x.ts);const mb=(d.history||[]).map(x=>((x.bytes||0)/1024/1024).toFixed(3));
new Chart(document.getElementById('timeline'),{type:'line',data:{labels:labels,datasets:[{label:'MB за срез',data:mb,borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.15)',fill:true,tension:.35}]}});
const tlabels=(d.trafficTypes||[]).map(x=>x.type);const tvals=(d.trafficTypes||[]).map(x=>x.mb);
new Chart(document.getElementById('types'),{type:'doughnut',data:{labels:tlabels.length?tlabels:['Нет данных'],datasets:[{data:tvals.length?tvals:[1],backgroundColor:tvals.length?['#16a34a','#2563eb','#f59e0b','#7c3aed','#ef4444']:['#e5e7eb']}]}});
const ins=document.getElementById('insights');
const items=[];
if((s.totalBytes||0)==0){items.push('За последние срезы трафик Dash через VPN не зафиксирован. Возможно, VPN на устройстве неактивен или используется другой профиль/сеть.');}
if(tlabels.includes('HTTPS/веб/видео')) items.push('Доминирует HTTPS-трафик (веб/видео), точный контент без DPI/расшифровки не виден.');
if(tlabels.includes('Google Push/FCM')||tlabels.includes('Apple Push')) items.push('Есть фоновая активность push-уведомлений.');
if(!items.length) items.push('Собран базовый срез. Для устойчивой аналитики нужен интервал наблюдения 12–24 часа.');
items.forEach(t=>{const li=document.createElement('li');li.textContent=t;ins.appendChild(li);});
const top=(s.topEndpoints||[]).slice(0,50);const tb=document.getElementById('tb');top.forEach((x,i)=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${i+1}</td><td>${x.endpoint}</td><td>${x.packets}</td><td>${(x.bytes/1024/1024).toFixed(3)}</td>`;tb.appendChild(tr);});
</script></body></html>
