<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dash мониторинг</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>body{font-family:Inter,system-ui;background:#f5f7fb;margin:0;color:#1f2937}.wrap{max-width:1100px;margin:18px auto;padding:0 14px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;margin-bottom:12px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.kpi{grid-column:span 4}.full{grid-column:1/-1}@media(max-width:900px){.kpi{grid-column:1/-1}}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:8px;border-bottom:1px solid #eee;text-align:left}.muted{color:#6b7280}</style></head><body><div class="wrap"><div class="card"><h1>📱 Dash мониторинг трафика (автосъём)</h1><div class='muted'>Срез: 2026-04-02T20:12:24.380932Z • каждые 15 минут</div></div><div class="grid"><div class="card kpi"><div>Пакеты (срез)</div><h2 id='pk'></h2></div><div class="card kpi"><div>Трафик MB (срез)</div><h2 id='mb'></h2></div><div class="card kpi"><div>Статус</div><h2 id='st'></h2></div><div class="card full"><h3>История автосъёма</h3><canvas id='line'></canvas></div><div class="card full"><h3>Топ endpoint'ов</h3><canvas id='bar'></canvas></div><div class="card full"><h3>Детали</h3><table><thead><tr><th>#</th><th>Endpoint</th><th>Packets</th><th>MB</th></tr></thead><tbody id='tb'></tbody></table></div></div></div><script>const s={"generatedAt": "2026-04-02T20:12:24.380932Z", "captureFile": "/opt/netstack/monitor/dash-20260402T201224Z.log", "devices": {}, "topEndpoints": [], "totalPackets": 0, "totalBytes": 0}; const hist=[{"ts": "2026-04-02T20:12:24.380932Z", "packets": 0, "bytes": 0, "dash1Bytes": 0, "dash2Bytes": 0}];document.getElementById('pk').textContent=s.totalPackets||0;document.getElementById('mb').textContent=((s.totalBytes||0)/1024/1024).toFixed(3);document.getElementById('st').textContent=(s.totalBytes||0)>0?'🟢 есть трафик':'⚪ трафик не зафиксирован';new Chart(document.getElementById('line'),{type:'line',data:{labels:hist.map(x=>x.ts.slice(11,16)),datasets:[{label:'MB',data:hist.map(x=>(x.bytes/1024/1024).toFixed(3)),borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.15)',fill:true,tension:.35}]}});const top=(s.topEndpoints||[]).slice(0,20);new Chart(document.getElementById('bar'),{type:'bar',data:{labels:top.map(x=>x.endpoint),datasets:[{label:'MB',data:top.map(x=>(x.bytes/1024/1024).toFixed(3)),backgroundColor:'#16a34a'}]},options:{plugins:{legend:{display:false}}}});const tb=document.getElementById('tb');top.forEach((x,i)=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${i+1}</td><td>${x.endpoint}</td><td>${x.packets}</td><td>${(x.bytes/1024/1024).toFixed(3)}</td>`;tb.appendChild(tr);});</script></body></html>
