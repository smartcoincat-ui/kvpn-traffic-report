<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dash Мониторинг трафика</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>body{font-family:Inter,system-ui;background:#f5f7fb;margin:0;color:#1f2937}.wrap{max-width:1100px;margin:18px auto;padding:0 14px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;margin-bottom:12px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.kpi{grid-column:span 4}.full{grid-column:1/-1}@media(max-width:900px){.kpi{grid-column:1/-1}}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:8px;border-bottom:1px solid #eee;text-align:left}</style></head><body><div class="wrap"><div class="card"><h1>📱 Dash: мониторинг трафика (срез)</h1><div id="meta"></div></div><div class="grid"><div class="card kpi"><div>Пакетов</div><h2 id="pk"></h2></div><div class="card kpi"><div>Трафик (MB)</div><h2 id="mb"></h2></div><div class="card kpi"><div>Активные профили Dash</div><h2 id="dv"></h2></div><div class="card full"><h3>Распределение по профилям</h3><canvas id="pie"></canvas></div><div class="card full"><h3>Топ endpoint'ов (IP:порт)</h3><canvas id="bar"></canvas></div><div class="card full"><h3>Детально</h3><table><thead><tr><th>#</th><th>Endpoint</th><th>Packets</th><th>Bytes</th><th>MB</th></tr></thead><tbody id="tb"></tbody></table></div></div></div><script>const d={"generatedAt": "2026-04-02T20:08:16.081492Z", "captureFile": "/opt/netstack/monitor/dash-20260402T200815Z.log", "devices": {}, "topEndpoints": [], "totalPackets": 0, "totalBytes": 0};document.getElementById('meta').textContent=`Сформирован: ${d.generatedAt} • Файл: ${d.captureFile}`;document.getElementById('pk').textContent=d.totalPackets;document.getElementById('mb').textContent=(d.totalBytes/1024/1024).toFixed(2);document.getElementById('dv').textContent=Object.keys(d.devices||{}).length;
const labels=Object.keys(d.devices||{});const vals=labels.map(k=>((d.devices[k].bytes||0)/1024/1024).toFixed(2));new Chart(document.getElementById('pie'),{type:'doughnut',data:{labels:labels,datasets:[{data:vals,backgroundColor:['#2563eb','#f59e0b']}]}});
const top=d.topEndpoints.slice(0,20);new Chart(document.getElementById('bar'),{type:'bar',data:{labels:top.map(x=>x.endpoint),datasets:[{label:'MB',data:top.map(x=>(x.bytes/1024/1024).toFixed(2)),backgroundColor:'#16a34a'}]},options:{plugins:{legend:{display:false}}}});
const tb=document.getElementById('tb');top.forEach((x,i)=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${i+1}</td><td>${x.endpoint}</td><td>${x.packets}</td><td>${x.bytes}</td><td>${(x.bytes/1024/1024).toFixed(3)}</td>`;tb.appendChild(tr);});</script></body></html>
